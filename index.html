<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnos - Cosmetología Ohana</title>
  <!-- Tailwind CSS para el diseño estético -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center p-4">

  <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-serif font-semibold text-gray-800">Cosmetología Ohana</h1>
      <p class="text-sm text-gray-500 mt-1">Agendá tu sesión de forma online y rápida</p>
    </div>

    <!-- Formulario de Turnos -->
    <form id="form-turno" class="space-y-5">
      <!-- 1. SELECCIONAR SERVICIO -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">1. Seleccioná el servicio</label>
        <div class="space-y-2">
          <label class="flex justify-between items-center p-3 rounded-xl border-2 border-gray-200 bg-white cursor-pointer hover:border-gray-300">
            <input type="radio" name="servicio" value="Limpieza Facial Profunda" required class="accent-pink-600">
            <div class="ml-2 flex-1">
              <p class="font-medium text-gray-800 text-sm">Limpieza Facial Profunda</p>
              <p class="text-xs text-gray-400">60 min</p>
            </div>
            <span class="font-semibold text-pink-600 text-sm">$4500</span>
          </label>
          <label class="flex justify-between items-center p-3 rounded-xl border-2 border-gray-200 bg-white cursor-pointer hover:border-gray-300">
            <input type="radio" name="servicio" value="Lifting de Pestañas" class="accent-pink-600">
            <div class="ml-2 flex-1">
              <p class="font-medium text-gray-800 text-sm">Lifting de Pestañas</p>
              <p class="text-xs text-gray-400">75 min</p>
            </div>
            <span class="font-semibold text-pink-600 text-sm">$3800</span>
          </label>
        </div>
      </div>

      <!-- 2. FECHA Y HORA -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">2. Elegí el día</label>
          <input type="date" id="fecha" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">3. Elegí el horario</label>
          <select id="hora" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
            <option value="09:00">09:00 hs</option>
            <option value="10:30">10:30 hs</option>
            <option value="14:00">14:00 hs</option>
            <option value="15:30">15:30 hs</option>
          </select>
        </div>
      </div>

      <!-- 3. DATOS -->
      <div class="space-y-3 pt-2 border-t border-gray-100">
        <label class="block text-sm font-medium text-gray-700">4. Completá tus datos</label>
        <input type="text" id="nombre" placeholder="Tu nombre y apellido" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
        <input type="tel" id="whatsapp" placeholder="WhatsApp (ej: 3416123456)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
        
        <button type="submit" class="w-full bg-pink-600 text-white py-3.5 rounded-xl font-semibold hover:bg-pink-700 transition shadow-md mt-4">
          Confirmar Reserva
        </button>
      </div>
    </form>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ REEMPLAZA ESTO CON TUS DATOS DE FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyBMqTpXFcSbP0LFE_Lhd_q7XOio5LK9bfs",
  authDomain: "ohana-c48ce.firebaseapp.com",
  databaseURL: "https://ohana-c48ce-default-rtdb.firebaseio.com",
  projectId: "ohana-c48ce",
  storageBucket: "ohana-c48ce.firebasestorage.app",
  messagingSenderId: "525566029266",
  appId: "1:525566029266:web:8cd9729f2524a966c32c0b",
  measurementId: "G-08BFEV5SFC"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Escuchar el envío del formulario
    document.getElementById('form-turno').addEventListener('submit', async (e) => {
      e.preventDefault();

      const servicio = document.querySelector('input[name="servicio"]:checked').value;
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const nombre = document.getElementById('nombre').value;
      const whatsapp = document.getElementById('whatsapp').value;

      try {
        // Guardar en Firestore en la colección "turnos"
        await addDoc(collection(db, "turnos"), {
          servicio,
          fecha,
          hora,
          nombre,
          whatsapp,
          estado: "pendiente",
          creadoEl: new Date().toISOString()
        });

        // Mostrar pantalla de éxito
        document.getElementById('app').innerHTML = `
          <div class="text-center py-8">
            <div class="text-5xl mb-4">✨</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Turno Solicitado!</h2>
            <p class="text-gray-600 mb-6">Hola ${nombre}, guardamos tu turno para el ${fecha} a las ${hora} hs. Te confirmamos a la brevedad por WhatsApp.</p>
            <button onclick="window.location.reload()" class="w-full bg-pink-600 text-white py-3 rounded-xl font-semibold legacy-button">Pedir otro turno</button>
          </div>
        `;
      } catch (error) {
        alert("Hubo un error al guardar el turno. Intentá de nuevo.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
